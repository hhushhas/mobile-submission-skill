# Compact sparse packet for mobile-submission.
# Omit unknown/default fields in real packets. Keep secrets as refs only.

v: 1
status: ready # ready | ready_warn | blocked
intent: "Submit v1.4.0 to App Store Review and Google open testing."

stores: [ios, android] # ios | android

release:
  version: 1.4.0
  build: 42
  notes:
    en-US: "Bug fixes and performance improvements."

listing:
  title: "Super App"
  subtitle: "Fast, private, and simple."
  short: "A concise Google Play short description."
  full: "Full store description."
  category: productivity
  keywords: ["productivity", "utility"]
  countries: ["US"]

ios:
  bundle: com.acme.app
  target: app_review # app_review | tf_external | tf_internal
  release: manual # manual | auto | scheduled
  ipa: dist/app.ipa
  ipa_sha256: null
  build_id: null # existing App Store Connect build ID, if using uploaded build
  asc: env:ASC_API_KEY_JSON
  app_privacy: ref:docs/app-privacy.yaml
  uses_tracking: false
  uses_non_exempt_encryption: false
  content_rights: "Does not contain, show, or access third-party content unless licensed."
  age_rating: "No objectionable content; suitable for general audience."
  review_contact:
    name: "Support Team"
    email: support@example.com
    phone: "+15551234567"
  demo_account: secret:op://Mobile/AppDemo
  review_notes: "Use demo login, then test the core flow."
  testflight:
    beta_description: "Test the main app flow and report feedback."
    feedback_email: support@example.com
    groups: ["External Testers"]

android:
  package: com.acme.app
  track: open # internal | closed:<name> | open | production
  status: completed # draft | inProgress | completed | halted
  rollout: null # required only for inProgress, e.g. 0.1
  aab: dist/app.aab
  aab_sha256: null
  version_code: null # existing Play version code, if using uploaded build
  play: env:GOOGLE_APPLICATION_CREDENTIALS
  app_access: "All features are available without special access, or use review.demo."
  ads: false
  content_rating: "General audience; no violence, sexual content, gambling, or controlled substances."
  target_audience: "Adults"
  news: false
  covid19: false
  data_safety: ref:docs/play-data-safety.csv
  financial_features: false
  health: false
  government: false
  permissions:
    exact_alarm: false
    full_screen_intent: false
    background_location: false
  account_deletion: "Users can delete their account at urls.deletion."
  testing_instructions: "Install, open the app, log in if needed, and test the core flow."

review:
  demo: secret:op://Mobile/AppDemo
  contact: support@example.com
  phone: "+15551234567"

urls:
  privacy: https://example.com/privacy
  support: https://example.com/support
  deletion: https://example.com/delete-account

assets:
  screenshots: store/screenshots
  previews: store/previews
  feature: store/google/feature-graphic.png

controls:
  action: dry-run # dry-run | submit | resume
  artifact: packet # packet | uploaded | build

risks:
  - "Apple build processing may require polling before review submission."
